<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>실습문제250703</title>
</head>
<body>
    <form action="" method="" id="formid">

        <!--
        //id,for -> test ok!

        formid
        nameid
        emailid
        male
        female
        rqid

        //name은 input에 전부 처리
        
        1.nameN
        2.emailN
        3.genderN
        4.dateN
        5.rqN
        6,?

        //value
        M
        F
        DATE x

        //submit을 보내면! name과 value과 이동!
        name은 데이터 이름
        value는 데이터의 값 

        action = data를 보낼 주소
        method = post or get 

        
        -->

        <!--
        이벤트 처리 
        1이름이 없으면 "이 입력을 작성하세요. 알람"
        2이메일 주소에 @를 포함해주세요 -> 기본 포함      xx
        3radio 처리 
        3참여일자 를 누르지 않고 누르면 참여일자를 선택해 주세요
        4요청사항에 500/500자 실시간으로 업데이트
        5 개인정보 수집에 동의합니다. 체크시에 배경이 연두색
        6 

        
        -->

        <h1>사용자 입력 양식 이벤트 연습하기</h1>

        <label for="nameid" >이름</label><br>
            <input type="text" id="nameid" name="nameN" value=""><br>
        <label for="emailid">이메일</label><br>
            <input type="email" id="emailid" name="emailN" value=""><br>
        <label >성별</label><br>
            <label for="male">남</label>
                <input type="radio" value="M" name="genderN" value="">
            <label for="female">여</label>
                <input type="radio" value="F" name="genderN" value=""><br>
        <label>참여 일자 선택</label><br><!-- 참여일자 바꾸기 -->
            <select name="dateN" value="">
            <option value="">한국</option>
            <option value="">중국</option>
            <option value="">일본</option>
            <option value="" selected>기타</option>
            </select><br>
        <label for="rqid" >요청 사항</label><br>
            <input type="text" id="rqid" name="rqN" value=""><br>
        <label>개인정보 수집에 동의합니다.</label><br>
            <button type="submit" onclick="submitForm()" value="">전송</button>

    </form>

    <script>
        /*
            const formJS 
        */

    function submitForm() {
    const formJS = document.getElementById("formid");
    //event.preventDefault(); //기본 submit 동작을 막아 콘솔에 표현하게해줌 
    console.log(formJS);}


    formJS.submit(); // name과 value를 포함하여 서버로 제출 새로고침하기에 현재 주석처리 


</script>

</body>
</html>
